<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Hospital Dashboard</title>
  <link rel="icon" type="image/png" href="image/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R4AJQFfYyq6X+7c2wM3H2yJ6M1w5FQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="splash" class="splash-screen">
    <div class="splash-logo" id="splash-logo"></div>
  </div>
  <div id="app" style="display:none;">
    <section id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="logo-badge">+</div>
        <h1>Smart Hospital</h1>
        <p>Thông minh hơn để chăm sóc tốt hơn</p>
        <form id="login-form" class="form-stack">
          <label>Tên đăng nhập</label>
          <input id="username" type="text" placeholder="Nhập tên đăng nhập" required />

          <label>Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu" required />

          <button type="submit">Đăng nhập</button>
        </form>

        <p id="login-error" class="error-text"></p>
      </div>
    </section>

    <section id="dashboard" class="dashboard hidden">
      <aside class="sidebar">
        <div class="brand">
          <h2>Smart Hospital</h2>
          <p>Management System</p>
        </div>

        <nav id="menu"></nav>

        <div class="profile-box">
          <div class="avatar" id="avatar">S</div>
          <div>
            <h4 id="profile-name"></h4>
            <p id="profile-role"></p>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <input type="text" id="global-search" placeholder="Tìm bệnh nhân, y tá, robot..." />
          <div class="topbar-right">
            <span id="permission-badge" class="perm-badge"></span>
            <button id="logout-btn" class="ghost-btn"><img src="image/logout.png" alt="logout" class="icon-img" style="width:18px;height:18px;margin-right:6px;vertical-align:middle;"/><span>Đăng xuất</span></button>
          </div>
        </header>

        <section id="view-patients" class="view"></section>
        <section id="view-rooms" class="view hidden"></section>
        <section id="view-nurses" class="view hidden"></section>
        <section id="view-robots" class="view hidden"></section>
        <section id="view-delivery" class="view hidden"></section>
        <section id="view-logs" class="view hidden"></section>
      </main>
    </section>
  </div>

  <script type="module" src="js/index.js"></script>
  <script>
    // Hiệu ứng splash từng chữ cho Smart Hospital
    const splashLogo = document.getElementById('splash-logo');
    const splashText = 'Smart Hospital';
    let html = '';
    for (let i = 0; i < splashText.length; i++) {
      const c = splashText[i] === ' ' ? '&nbsp;' : splashText[i];
      html += `<span class="splash-char" style="animation-delay:${i*0.08}s">${c}</span>`;
    }
    splashLogo.innerHTML = html;
    // Ẩn splash sau hiệu ứng
    setTimeout(() => {
      document.getElementById('splash').style.opacity = 0;
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').style.display = '';
      }, 600);
    }, 1800);
  </script>
  <style>
    .splash-screen {
      position: fixed;
      z-index: 9999;
      inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s;
    }
    .splash-logo {
      font-size: 3.2rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #2f7bff;
      display: flex;
      gap: 0.08em;
      font-family: 'Be Vietnam Pro', sans-serif;
      user-select: none;
    }
    .splash-char {
      opacity: 0;
      transform: translateY(32px) scale(0.8) rotate(-8deg);
      animation: splashIn 0.5s cubic-bezier(.7,-0.2,.3,1.4) forwards;
    }
    .splash-char:nth-child(odd) {
      color: #00afdd;
    }
    @keyframes splashIn {
      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
  
</body>
</html>
