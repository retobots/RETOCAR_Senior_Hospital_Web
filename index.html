<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Hospital Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R4AJQFfYyq6X+7c2wM3H2yJ6M1w5FQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="login-screen" class="login-screen">
      <div class="login-card">
        <div class="logo-badge">+</div>
        <h1>Smart Hospital</h1>
        <p>Thông minh hơn để chăm sóc tốt hơn</p>
        <form id="login-form" class="form-stack">
          <label>Tên đăng nhập</label>
          <input id="username" type="text" placeholder="Nhập tên đăng nhập" required />

          <label>Mật khẩu</label>
          <input id="password" type="password" placeholder="Nhập mật khẩu" required />

          <button type="submit">Đăng nhập</button>
        </form>

        <p id="login-error" class="error-text"></p>
      </div>
    </section>

    <section id="dashboard" class="dashboard hidden">
      <aside class="sidebar">
        <div class="brand">
          <h2>Smart Hospital</h2>
          <p>Management System</p>
        </div>

        <nav id="menu"></nav>

        <div class="profile-box">
          <div class="avatar" id="avatar">S</div>
          <div>
            <h4 id="profile-name"></h4>
            <p id="profile-role"></p>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <input type="text" id="global-search" placeholder="Tìm bệnh nhân, y tá, robot..." />
          <div class="topbar-right">
            <span id="permission-badge" class="perm-badge"></span>
            <button id="logout-btn" class="ghost-btn"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i><span>Đăng xuất</span></button>
          </div>
        </header>

        <section id="view-patients" class="view"></section>
        <section id="view-nurses" class="view hidden"></section>
        <section id="view-robots" class="view hidden"></section>
        <section id="view-delivery" class="view hidden"></section>
        <section id="view-logs" class="view hidden"></section>
      </main>
    </section>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
